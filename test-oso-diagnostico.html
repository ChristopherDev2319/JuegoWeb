<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐻 Diagnóstico Modelo de Oso</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1a1a1a;
            color: white;
            font-family: 'Courier New', monospace;
        }
        .panel {
            position: fixed;
            top: 10px;
            left: 10px;
            width: 400px;
            background: rgba(0,0,0,0.9);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #333;
            z-index: 1000;
            max-height: 90vh;
            overflow-y: auto;
        }
        .success { color: #00ff00; }
        .error { color: #ff0000; }
        .warning { color: #ffaa00; }
        .info { color: #00aaff; }
        #canvas-container {
            margin-left: 430px;
            width: calc(100% - 450px);
            height: 100vh;
        }
        button {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 8px 12px;
            margin: 5px 0;
            cursor: pointer;
            border-radius: 4px;
            width: 100%;
        }
        button:hover { background: #555; }
        .log-entry {
            margin: 3px 0;
            padding: 3px;
            font-size: 12px;
            border-left: 2px solid #555;
            padding-left: 8px;
        }
    </style>
</head>
<body>
    <div class="panel">
        <h3>🐻 Diagnóstico Modelo de Oso</h3>
        <div id="status">Iniciando...</div>
        
        <button id="btn-cargar">🔄 Cargar Modelo</button>
        <button id="btn-crear-cubo">📦 Crear Cubo Test</button>
        <button id="btn-analizar">🔍 Analizar Modelo</button>
        <button id="btn-wireframe">🔲 Toggle Wireframe</button>
        <button id="btn-reset-camera">📷 Reset Cámara</button>
        
        <div id="log"></div>
    </div>
    
    <div id="canvas-container"></div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // Variables globales
        let scene, camera, renderer, controls;
        let statusDiv = document.getElementById('status');
        let logDiv = document.getElementById('log');
        let modeloOso = null;
        let objetosEnEscena = [];
        let wireframeMode = false;

        function updateStatus(message, type = 'info') {
            const colors = {
                info: '#00aaff',
                success: '#00ff00',
                error: '#ff0000',
                warning: '#ffaa00'
            };
            statusDiv.innerHTML = `<span style="color: ${colors[type]}">${message}</span>`;
            console.log(message);
        }

        function addLog(message, type = 'info') {
            const colors = {
                info: '#00aaff',
                success: '#00ff00',
                error: '#ff0000',
                warning: '#ffaa00'
            };
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span style="color: ${colors[type]}">[${new Date().toLocaleTimeString()}] ${message}</span>`;
            logDiv.appendChild(entry);
            
            // Mantener solo las últimas 30 líneas
            while (logDiv.children.length > 30) {
                logDiv.removeChild(logDiv.firstChild);
            }
            
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }

        function init() {
            updateStatus('🚀 Inicializando escena...', 'info');

            // Crear escena
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb); // Cielo azul claro

            // Crear cámara
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 5, 5);
            camera.lookAt(0, 0, 0);

            // Crear renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth - 450, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.setClearColor(0x87ceeb);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Iluminación múltiple para mejor visibilidad
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8); // Más luz ambiental
            scene.add(ambientLight);
            addLog('✅ Luz ambiental agregada', 'success');

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
            directionalLight.position.set(10, 10, 5);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);
            addLog('✅ Luz direccional agregada', 'success');

            // Luz adicional desde otro ángulo
            const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.5);
            directionalLight2.position.set(-10, 10, -5);
            scene.add(directionalLight2);
            addLog('✅ Luz direccional 2 agregada', 'success');

            // Suelo con grid visible
            const groundGeometry = new THREE.PlaneGeometry(20, 20);
            const groundMaterial = new THREE.MeshLambertMaterial({ 
                color: 0x228b22,
                transparent: true,
                opacity: 0.8
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
            addLog('✅ Suelo creado', 'success');

            // Grid helper más visible
            const gridHelper = new THREE.GridHelper(20, 20, 0x000000, 0x444444);
            scene.add(gridHelper);
            addLog('✅ Grid helper agregado', 'success');

            // Ejes de referencia
            const axesHelper = new THREE.AxesHelper(5);
            scene.add(axesHelper);
            addLog('✅ Ejes de referencia agregados', 'success');

            updateStatus('✅ Escena creada', 'success');
            addLog('🎯 Haz click en "Cargar Modelo" para empezar', 'info');
            
            // Iniciar loop de renderizado
            animate();
        }

        function cargarModelo() {
            updateStatus('🐻 Cargando modelo de oso...', 'info');
            addLog('🔄 Iniciando carga de /modelos/cubed_bear.glb', 'info');
            
            const loader = new THREE.GLTFLoader();
            
            loader.load('/modelos/cubed_bear.glb', 
                (gltf) => {
                    addLog('✅ Archivo GLB cargado exitosamente', 'success');
                    
                    modeloOso = gltf.scene;
                    
                    // Análisis detallado del modelo
                    addLog('🔍 Analizando estructura del modelo...', 'info');
                    
                    let totalMeshes = 0;
                    let totalMateriales = 0;
                    let totalVertices = 0;
                    
                    modeloOso.traverse((child) => {
                        addLog(`📦 Objeto encontrado: ${child.type} - ${child.name || 'Sin nombre'}`, 'info');
                        
                        if (child.isMesh) {
                            totalMeshes++;
                            totalVertices += child.geometry.attributes.position.count;
                            
                            addLog(`  └ Mesh: ${child.name || 'Sin nombre'}`, 'success');
                            addLog(`    └ Vértices: ${child.geometry.attributes.position.count}`, 'info');
                            addLog(`    └ Visible: ${child.visible}`, child.visible ? 'success' : 'error');
                            addLog(`    └ Posición: (${child.position.x.toFixed(2)}, ${child.position.y.toFixed(2)}, ${child.position.z.toFixed(2)})`, 'info');
                            addLog(`    └ Escala: (${child.scale.x.toFixed(2)}, ${child.scale.y.toFixed(2)}, ${child.scale.z.toFixed(2)})`, 'info');
                            
                            if (child.material) {
                                totalMateriales++;
                                const mat = child.material;
                                addLog(`    └ Material: ${mat.type}`, 'success');
                                addLog(`      └ Color: #${mat.color ? mat.color.getHexString() : 'N/A'}`, 'info');
                                addLog(`      └ Visible: ${mat.visible}`, mat.visible ? 'success' : 'error');
                                addLog(`      └ Opacity: ${mat.opacity}`, 'info');
                                addLog(`      └ Transparent: ${mat.transparent}`, 'info');
                                
                                if (mat.map) {
                                    addLog(`      └ Textura: ✅ Presente`, 'success');
                                    addLog(`        └ Tamaño: ${mat.map.image?.width || 'N/A'}x${mat.map.image?.height || 'N/A'}`, 'info');
                                } else {
                                    addLog(`      └ Textura: ❌ No presente`, 'warning');
                                }
                            } else {
                                addLog(`    └ Material: ❌ No presente`, 'error');
                            }
                        }
                    });
                    
                    addLog(`📊 RESUMEN: ${totalMeshes} meshes, ${totalMateriales} materiales, ${totalVertices} vértices`, 'success');
                    
                    // Configurar el modelo para mejor visibilidad
                    modeloOso.position.set(0, 0, 0);
                    modeloOso.scale.set(2, 2, 2); // Hacer más grande
                    modeloOso.castShadow = true;
                    modeloOso.receiveShadow = true;
                    
                    // Asegurar que todos los materiales sean visibles
                    modeloOso.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                            child.visible = true;
                            
                            if (child.material) {
                                child.material.visible = true;
                                child.material.needsUpdate = true;
                                
                                // Si no tiene color, darle uno
                                if (!child.material.color) {
                                    child.material.color = new THREE.Color(0x8B4513); // Marrón
                                    addLog(`    └ Color asignado: marrón`, 'warning');
                                }
                            }
                        }
                    });
                    
                    scene.add(modeloOso);
                    objetosEnEscena.push(modeloOso);
                    
                    // Calcular bounding box para ajustar cámara
                    const box = new THREE.Box3().setFromObject(modeloOso);
                    const size = box.getSize(new THREE.Vector3());
                    const center = box.getCenter(new THREE.Vector3());
                    
                    addLog(`📏 Tamaño del modelo: ${size.x.toFixed(2)} x ${size.y.toFixed(2)} x ${size.z.toFixed(2)}`, 'info');
                    addLog(`📍 Centro del modelo: (${center.x.toFixed(2)}, ${center.y.toFixed(2)}, ${center.z.toFixed(2)})`, 'info');
                    
                    // Ajustar cámara para ver el modelo
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const distance = maxDim * 3;
                    camera.position.set(distance, distance, distance);
                    camera.lookAt(center);
                    
                    updateStatus('✅ Modelo cargado y configurado', 'success');
                    addLog('🎯 Modelo agregado a la escena', 'success');
                    
                }, 
                (progress) => {
                    if (progress.total > 0) {
                        const percent = Math.round((progress.loaded / progress.total) * 100);
                        updateStatus(`🔄 Cargando: ${percent}%`, 'info');
                        addLog(`📊 Progreso: ${percent}%`, 'info');
                    }
                }, 
                (error) => {
                    addLog(`❌ ERROR cargando modelo: ${error.message}`, 'error');
                    updateStatus(`❌ Error: ${error.message}`, 'error');
                    
                    // Información de debug
                    addLog(`🔧 URL intentada: /modelos/cubed_bear.glb`, 'info');
                    addLog(`🔧 Error tipo: ${error.constructor.name}`, 'info');
                    addLog(`🔧 Detalles: ${JSON.stringify(error)}`, 'info');
                    
                    // Crear cubo fallback automáticamente
                    crearCuboTest();
                }
            );
        }

        function crearCuboTest() {
            addLog('📦 Creando cubo de prueba...', 'info');
            
            const geometry = new THREE.BoxGeometry(2, 3, 2);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x8B4513, // Marrón como un oso
                roughness: 0.7,
                metalness: 0.1
            });
            
            const cubo = new THREE.Mesh(geometry, material);
            cubo.position.set(2, 1.5, 0);
            cubo.castShadow = true;
            cubo.receiveShadow = true;
            cubo.userData.esFallback = true;
            
            scene.add(cubo);
            objetosEnEscena.push(cubo);
            
            addLog('✅ Cubo de prueba creado', 'success');
            updateStatus('✅ Cubo de prueba visible', 'success');
        }

        function analizarModelo() {
            if (!modeloOso) {
                addLog('❌ No hay modelo cargado para analizar', 'error');
                return;
            }
            
            addLog('🔍 === ANÁLISIS DETALLADO ===', 'info');
            addLog(`🎯 Modelo en escena: ${scene.children.includes(modeloOso) ? 'SÍ' : 'NO'}`, scene.children.includes(modeloOso) ? 'success' : 'error');
            addLog(`👁️ Modelo visible: ${modeloOso.visible ? 'SÍ' : 'NO'}`, modeloOso.visible ? 'success' : 'error');
            
            // Verificar cada mesh individualmente
            let meshesVisibles = 0;
            let meshesInvisibles = 0;
            
            modeloOso.traverse((child) => {
                if (child.isMesh) {
                    if (child.visible && child.material && child.material.visible && child.material.opacity > 0) {
                        meshesVisibles++;
                        addLog(`✅ Mesh visible: ${child.name || 'Sin nombre'}`, 'success');
                    } else {
                        meshesInvisibles++;
                        addLog(`❌ Mesh invisible: ${child.name || 'Sin nombre'}`, 'error');
                        addLog(`  └ visible: ${child.visible}`, child.visible ? 'success' : 'error');
                        addLog(`  └ material.visible: ${child.material?.visible}`, child.material?.visible ? 'success' : 'error');
                        addLog(`  └ material.opacity: ${child.material?.opacity}`, 'info');
                    }
                }
            });
            
            addLog(`📊 Meshes visibles: ${meshesVisibles}, invisibles: ${meshesInvisibles}`, meshesVisibles > 0 ? 'success' : 'error');
        }

        function toggleWireframe() {
            wireframeMode = !wireframeMode;
            addLog(`🔲 Wireframe: ${wireframeMode ? 'ON' : 'OFF'}`, 'info');
            
            objetosEnEscena.forEach(objeto => {
                objeto.traverse((child) => {
                    if (child.isMesh && child.material) {
                        child.material.wireframe = wireframeMode;
                        child.material.needsUpdate = true;
                    }
                });
            });
        }

        function resetCamera() {
            camera.position.set(5, 5, 5);
            camera.lookAt(0, 0, 0);
            addLog('📷 Cámara reiniciada', 'info');
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Rotar objetos lentamente
            objetosEnEscena.forEach((objeto, index) => {
                objeto.rotation.y += 0.01 * (index + 1);
            });
            
            renderer.render(scene, camera);
        }

        // Event listeners
        document.addEventListener('DOMContentLoaded', function() {
            addLog('🔧 Configurando event listeners...', 'info');
            
            document.getElementById('btn-cargar').addEventListener('click', cargarModelo);
            document.getElementById('btn-crear-cubo').addEventListener('click', crearCuboTest);
            document.getElementById('btn-analizar').addEventListener('click', analizarModelo);
            document.getElementById('btn-wireframe').addEventListener('click', toggleWireframe);
            document.getElementById('btn-reset-camera').addEventListener('click', resetCamera);
            
            addLog('✅ Event listeners configurados', 'success');
        });

        // Manejar redimensionamiento
        window.addEventListener('resize', () => {
            camera.aspect = (window.innerWidth - 450) / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth - 450, window.innerHeight);
        });

        // Inicializar
        init();
    </script>
</body>
</html>
