<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>🐻 Test Oso Básico</title>
    <style>
        body { margin: 0; background: #222; color: white; font-family: Arial; }
        #container { width: 100vw; height: 100vh; }
        #info { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px; }
        button { margin: 5px; padding: 8px 16px; background: #4CAF50; color: white; border: none; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="info">
        <h3>🐻 Test Oso Básico</h3>
        <button onclick="cargarOso()">Cargar Oso</button>
        <button onclick="verificarModelo()">Verificar Modelo</button>
        <div id="status"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, oso;
        
        function init() {
            const container = document.getElementById('container');
            
            // Escena
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Azul cielo
            
            // Cámara
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 8);
            camera.lookAt(0, 0, 0);
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);
            
            // Luces MUY BRILLANTES
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.0); // Luz ambiente al máximo
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);
            directionalLight.position.set(10, 10, 5);
            directionalLight.castShadow = true;
            scene.add(directionalLight);
            
            // Luz puntual adicional
            const pointLight = new THREE.PointLight(0xffffff, 1.0, 100);
            pointLight.position.set(0, 5, 5);
            scene.add(pointLight);
            
            // Suelo verde brillante
            const groundGeometry = new THREE.PlaneGeometry(20, 20);
            const groundMaterial = new THREE.MeshLambertMaterial({ color: 0x00ff00 }); // Verde brillante
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // Cubo de referencia rojo
            const cubeGeometry = new THREE.BoxGeometry(1, 1, 1);
            const cubeMaterial = new THREE.MeshLambertMaterial({ color: 0xff0000 });
            const cube = new THREE.Mesh(cubeGeometry, cubeMaterial);
            cube.position.set(3, 0.5, 0);
            scene.add(cube);
            
            animate();
            log('✅ Escena inicializada - Cubo rojo visible como referencia');
        }
        
        function cargarOso() {
            log('🔄 Cargando oso...');
            
            const loader = new THREE.GLTFLoader();
            loader.load('/modelos/cubed_bear.glb', 
                // Success
                (gltf) => {
                    log('✅ Archivo GLB cargado exitosamente');
                    
                    oso = gltf.scene;
                    oso.position.set(0, 0, 0);
                    oso.scale.set(3, 3, 3); // Escala grande
                    
                    log(`📊 Oso cargado - Hijos: ${oso.children.length}`);
                    
                    // Diagnosticar cada mesh
                    let meshCount = 0;
                    oso.traverse((child) => {
                        if (child.isMesh) {
                            meshCount++;
                            log(`🔍 Mesh ${meshCount}: "${child.name || 'sin nombre'}"`);
                            
                            // Forzar visibilidad
                            child.visible = true;
                            child.castShadow = true;
                            child.receiveShadow = true;
                            child.frustumCulled = false;
                            
                            if (child.material) {
                                log(`   - Material: ${child.material.constructor.name}`);
                                log(`   - Visible: ${child.material.visible}`);
                                log(`   - Opacity: ${child.material.opacity}`);
                                log(`   - Transparent: ${child.material.transparent}`);
                                
                                // FORZAR MATERIAL VISIBLE
                                child.material.visible = true;
                                child.material.transparent = false;
                                child.material.opacity = 1.0;
                                child.material.needsUpdate = true;
                                
                                if (child.material.color) {
                                    const colorHex = child.material.color.getHex();
                                    log(`   - Color: #${colorHex.toString(16).padStart(6, '0')}`);
                                    
                                    // Si es negro o muy oscuro, cambiarlo
                                    if (colorHex < 0x333333) {
                                        child.material.color.setHex(0x8B4513); // Marrón
                                        log(`   - Color cambiado a marrón`);
                                    }
                                }
                                
                                // Si es MeshStandardMaterial, ajustar propiedades
                                if (child.material.isMeshStandardMaterial) {
                                    child.material.metalness = 0.0;
                                    child.material.roughness = 1.0;
                                    child.material.emissive.setHex(0x111111); // Poco brillo propio
                                }
                            } else {
                                log(`   - ⚠️ SIN MATERIAL!`);
                                // Crear material básico si no tiene
                                child.material = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
                            }
                        }
                    });
                    
                    scene.add(oso);
                    log(`🎉 Oso agregado a la escena con ${meshCount} meshes`);
                },
                // Progress
                (progress) => {
                    const percent = (progress.loaded / progress.total * 100).toFixed(0);
                    log(`📥 Cargando... ${percent}%`);
                },
                // Error
                (error) => {
                    log(`❌ ERROR cargando oso: ${error.message}`);
                    console.error('Error completo:', error);
                }
            );
        }
        
        function verificarModelo() {
            if (!oso) {
                log('⚠️ No hay oso cargado');
                return;
            }
            
            log('🔍 Verificando modelo...');
            log(`- Posición: (${oso.position.x}, ${oso.position.y}, ${oso.position.z})`);
            log(`- Escala: (${oso.scale.x}, ${oso.scale.y}, ${oso.scale.z})`);
            log(`- Visible: ${oso.visible}`);
            log(`- En escena: ${scene.children.includes(oso)}`);
            
            // Verificar cada mesh
            oso.traverse((child) => {
                if (child.isMesh) {
                    log(`🔍 Mesh "${child.name}": visible=${child.visible}, material=${child.material ? 'SÍ' : 'NO'}`);
                    if (child.material && child.material.color) {
                        const hex = child.material.color.getHex();
                        log(`   Color: #${hex.toString(16).padStart(6, '0')}`);
                    }
                }
            });
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            // Rotar el oso si existe
            if (oso) {
                oso.rotation.y += 0.01;
            }
            
            renderer.render(scene, camera);
        }
        
        function log(msg) {
            const div = document.createElement('div');
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            div.style.fontSize = '12px';
            div.style.margin = '2px 0';
            document.getElementById('status').appendChild(div);
            console.log(msg);
        }
        
        // Manejar redimensionamiento
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        init();
    </script>
</body>
</html>
