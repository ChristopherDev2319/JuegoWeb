<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐻 Test Osos Grandes</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1a1a1a;
            color: white;
            font-family: 'Courier New', monospace;
        }
        .info {
            position: fixed;
            top: 10px;
            left: 10px;
            width: 300px;
            background: rgba(0,0,0,0.9);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #333;
            z-index: 1000;
        }
        .success { color: #00ff00; }
        .error { color: #ff0000; }
        .warning { color: #ffaa00; }
        .info-color { color: #00aaff; }
        #canvas-container {
            margin-left: 330px;
            width: calc(100% - 350px);
            height: 100vh;
        }
        button {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 8px 12px;
            margin: 5px 0;
            cursor: pointer;
            border-radius: 4px;
            width: 100%;
        }
        button:hover { background: #555; }
    </style>
</head>
<body>
    <div class="info">
        <h3>🐻 Test: Osos Grandes</h3>
        <div id="status">Iniciando...</div>
        <button id="btn-crear">🐻 Crear Osos GRANDES</button>
        <button id="btn-mas-grande">📏 Aún Más Grandes</button>
        <button id="btn-reiniciar">🔄 Reiniciar</button>
        <div id="details"></div>
    </div>
    
    <div id="canvas-container"></div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // Variables globales
        let scene, camera, renderer;
        let statusDiv = document.getElementById('status');
        let detailsDiv = document.getElementById('details');
        let bots = [];
        let modeloOso = null;

        function updateStatus(message, type = 'info') {
            const colors = {
                'info-color': '#00aaff',
                success: '#00ff00',
                error: '#ff0000',
                warning: '#ffaa00'
            };
            statusDiv.innerHTML = `<span style="color: ${colors[type] || colors['info-color']}">${message}</span>`;
            console.log(message);
        }

        function addDetail(message, type = 'info-color') {
            const colors = {
                'info-color': '#00aaff',
                success: '#00ff00',
                error: '#ff0000',
                warning: '#ffaa00'
            };
            const div = document.createElement('div');
            div.innerHTML = `<span style="color: ${colors[type]}">${message}</span>`;
            detailsDiv.appendChild(div);
            
            // Mantener solo las últimas 8 líneas
            while (detailsDiv.children.length > 8) {
                detailsDiv.removeChild(detailsDiv.firstChild);
            }
        }

        function init() {
            updateStatus('🚀 Inicializando...', 'info-color');

            // Crear escena
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);

            // Crear cámara más cerca para ver mejor
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 8);

            // Crear renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth - 350, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Iluminación potente
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
            directionalLight.position.set(10, 10, 5);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            // Suelo
            const groundGeometry = new THREE.PlaneGeometry(20, 20);
            const groundMaterial = new THREE.MeshLambertMaterial({ color: 0x228b22 });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            updateStatus('✅ Escena creada', 'success');
            cargarModelo();
        }

        async function cargarModelo() {
            updateStatus('🐻 Cargando modelo...', 'info-color');
            
            const loader = new THREE.GLTFLoader();
            
            try {
                const gltf = await new Promise((resolve, reject) => {
                    loader.load('/modelos/cubed_bear.glb', resolve, undefined, reject);
                });

                modeloOso = gltf.scene;
                
                // ESCALAR EL MODELO ORIGINAL INMEDIATAMENTE
                const escalaInicial = 4; // 4 veces más grande
                modeloOso.scale.set(escalaInicial, escalaInicial, escalaInicial);
                
                updateStatus('✅ Modelo cargado y escalado', 'success');
                addDetail(`📏 Escalado inicial: x${escalaInicial}`, 'success');
                addDetail('🎯 Haz click en "Crear Osos GRANDES"', 'info-color');
                
            } catch (error) {
                updateStatus(`❌ Error: ${error.message}`, 'error');
                addDetail('❌ No se pudo cargar el modelo', 'error');
            }
        }

        function crearOsos() {
            if (!modeloOso) {
                updateStatus('❌ Modelo no cargado', 'error');
                return;
            }

            // Limpiar bots anteriores
            bots.forEach(bot => scene.remove(bot.mesh));
            bots = [];

            updateStatus('🐻 Creando osos GRANDES...', 'info-color');

            const tipos = ['🐻 OSO 1', '🐻 OSO 2', '🐻 OSO 3'];
            const posiciones = [[-6, 2, 0], [0, 2, 0], [6, 2, 0]]; // Más separados y más altos

            for (let i = 0; i < 3; i++) {
                // Clonar modelo
                const botMesh = modeloOso.clone(true);
                
                // Posición
                botMesh.position.set(...posiciones[i]);
                
                // ESCALA ADICIONAL para los bots individuales
                const escalaBot = 1.2; // 20% más grande aún
                botMesh.scale.multiplyScalar(escalaBot);
                
                // Configurar sombras y visibilidad
                botMesh.visible = true;
                botMesh.castShadow = true;
                botMesh.receiveShadow = true;
                
                botMesh.traverse((child) => {
                    if (child.isMesh) {
                        child.visible = true;
                        child.castShadow = true;
                        child.receiveShadow = true;
                        
                        if (child.material) {
                            child.material.visible = true;
                            child.material.needsUpdate = true;
                        }
                    }
                });

                // Crear etiqueta grande
                const etiqueta = crearEtiqueta(tipos[i]);
                etiqueta.position.set(0, 6, 0); // Más alta
                etiqueta.scale.set(3, 1.5, 1); // Más grande
                botMesh.add(etiqueta);

                scene.add(botMesh);
                bots.push({
                    mesh: botMesh,
                    tipo: tipos[i]
                });

                addDetail(`✅ ${tipos[i]} creado - GRANDE`, 'success');
            }

            updateStatus('✅ 3 osos GRANDES creados', 'success');
            addDetail('🎯 ¡Deberían verse claramente!', 'success');
            
            // Ajustar cámara
            camera.position.set(0, 6, 12);
            camera.lookAt(0, 4, 0);
            
            animate();
        }

        function hacerMasGrandes() {
            if (bots.length === 0) {
                updateStatus('⚠️ Crea osos primero', 'warning');
                return;
            }
            
            updateStatus('📏 Haciendo osos AÚN MÁS GRANDES...', 'info-color');
            
            const factor = 1.3; // 30% más grande
            
            bots.forEach((bot, index) => {
                bot.mesh.scale.multiplyScalar(factor);
                addDetail(`📏 ${bot.tipo} x${factor.toFixed(1)} más grande`, 'success');
            });
            
            updateStatus('✅ Osos escalados', 'success');
            addDetail('🐻 ¡Ahora deberían ser ENORMES!', 'success');
        }

        function crearEtiqueta(texto) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            // Fondo
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Texto
            ctx.fillStyle = 'white';
            ctx.font = 'bold 32px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(texto, canvas.width / 2, canvas.height / 2);
            
            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(material);
            
            return sprite;
        }

        function reiniciar() {
            bots.forEach(bot => scene.remove(bot.mesh));
            bots = [];
            detailsDiv.innerHTML = '';
            updateStatus('🔄 Reiniciado', 'info-color');
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Rotar osos
            bots.forEach((bot, index) => {
                bot.mesh.rotation.y += 0.01 * (index + 1);
            });
            
            renderer.render(scene, camera);
        }

        // Event listeners
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('btn-crear').addEventListener('click', crearOsos);
            document.getElementById('btn-mas-grande').addEventListener('click', hacerMasGrandes);
            document.getElementById('btn-reiniciar').addEventListener('click', reiniciar);
        });

        // Manejar redimensionamiento
        window.addEventListener('resize', () => {
            camera.aspect = (window.innerWidth - 350) / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth - 350, window.innerHeight);
        });

        // Inicializar
        init();
    </script>
</body>
</html>
