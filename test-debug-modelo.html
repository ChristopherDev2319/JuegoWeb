<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐻 Debug - Modelo de Oso</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: white;
        }
        
        #gameContainer {
            width: 100%;
            height: 60vh;
            border: 2px solid #333;
            position: relative;
        }
        
        #info {
            margin-top: 20px;
            padding: 15px;
            background: #333;
            border-radius: 5px;
        }
        
        .status {
            margin: 5px 0;
            padding: 5px;
            border-radius: 3px;
        }
        
        .success { background: #2d5a2d; }
        .error { background: #5a2d2d; }
        .warning { background: #5a5a2d; }
        
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <h1>🐻 Debug - Modelo de Oso</h1>
    
    <div id="gameContainer"></div>
    
    <div id="info">
        <h3>Estado:</h3>
        <div id="status-container"></div>
        
        <h3>Controles:</h3>
        <button onclick="testCargarModelo()">🔄 Cargar Modelo Directo</button>
        <button onclick="testModeloCache()">📦 Test Cache</button>
        <button onclick="limpiarConsola()">🧹 Limpiar</button>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script type="module">
        let scene, camera, renderer;
        let modeloCargado = null;
        
        // Inicializar Three.js
        function inicializarThreeJS() {
            const container = document.getElementById('gameContainer');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            
            camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 2, 5);
            camera.lookAt(0, 0, 0);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);
            
            // Luces
            const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 5, 5);
            directionalLight.castShadow = true;
            scene.add(directionalLight);
            
            // Suelo
            const groundGeometry = new THREE.PlaneGeometry(10, 10);
            const groundMaterial = new THREE.MeshLambertMaterial({ color: 0x90EE90 });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
            
            animate();
            mostrarStatus('✅ Three.js inicializado', 'success');
        }
        
        // Test 1: Cargar modelo directamente
        async function testCargarModelo() {
            try {
                mostrarStatus('🔄 Cargando modelo directamente...', 'success');
                
                const loader = new THREE.GLTFLoader();
                
                loader.load('/modelos/cubed_bear.glb', (gltf) => {
                    mostrarStatus('✅ Modelo cargado exitosamente', 'success');
                    
                    const modelo = gltf.scene;
                    modelo.position.set(0, 0, 0);
                    modelo.scale.set(2, 2, 2);
                    
                    // Diagnosticar el modelo
                    mostrarStatus(`📊 Hijos del modelo: ${modelo.children.length}`, 'success');
                    
                    modelo.traverse((child) => {
                        if (child.isMesh) {
                            mostrarStatus(`🔍 Mesh encontrado: ${child.name || 'sin nombre'}`, 'success');
                            mostrarStatus(`   - Geometría: ${child.geometry.constructor.name}`, 'success');
                            mostrarStatus(`   - Material: ${child.material.constructor.name}`, 'success');
                            mostrarStatus(`   - Visible: ${child.visible}`, 'success');
                            
                            if (child.material.color) {
                                const color = child.material.color.getHex();
                                mostrarStatus(`   - Color: #${color.toString(16).padStart(6, '0')}`, 'success');
                            }
                            
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });
                    
                    // Limpiar modelo anterior si existe
                    if (modeloCargado) {
                        scene.remove(modeloCargado);
                    }
                    
                    modeloCargado = modelo;
                    scene.add(modelo);
                    
                    mostrarStatus('🎉 Modelo agregado a la escena', 'success');
                    
                }, undefined, (error) => {
                    mostrarStatus(`❌ Error cargando modelo: ${error.message}`, 'error');
                    console.error('Error completo:', error);
                });
                
            } catch (error) {
                mostrarStatus(`❌ Error en test: ${error.message}`, 'error');
                console.error('Error completo:', error);
            }
        }
        
        // Test 2: Usar sistema de cache
        async function testModeloCache() {
            try {
                mostrarStatus('📦 Probando sistema de cache...', 'success');
                
                // Importar dinámicamente
                const { precargarModeloOso, crearClonOso } = await import('./src/sistemas/modeloCache.js');
                
                // Precargar
                mostrarStatus('🔄 Precargando modelo...', 'success');
                await precargarModeloOso();
                mostrarStatus('✅ Modelo precargado', 'success');
                
                // Crear clon
                mostrarStatus('🔄 Creando clon...', 'success');
                const clon = crearClonOso();
                
                if (clon) {
                    mostrarStatus('✅ Clon creado', 'success');
                    mostrarStatus(`📊 Escala del clon: ${clon.scale.x}`, 'success');
                    
                    clon.position.set(3, 0, 0); // Posición diferente
                    
                    // Limpiar modelo anterior si existe
                    if (modeloCargado) {
                        scene.remove(modeloCargado);
                    }
                    
                    modeloCargado = clon;
                    scene.add(clon);
                    
                    mostrarStatus('🎉 Clon agregado a la escena', 'success');
                } else {
                    mostrarStatus('❌ Clon es null', 'error');
                }
                
            } catch (error) {
                mostrarStatus(`❌ Error en cache: ${error.message}`, 'error');
                console.error('Error completo:', error);
            }
        }
        
        // Bucle de animación
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        
        // Utilidades
        function mostrarStatus(mensaje, tipo = 'success') {
            const container = document.getElementById('status-container');
            const div = document.createElement('div');
            div.className = `status ${tipo}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${mensaje}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            console.log(mensaje);
        }
        
        function limpiarConsola() {
            document.getElementById('status-container').innerHTML = '';
            console.clear();
        }
        
        // Hacer funciones globales
        window.testCargarModelo = testCargarModelo;
        window.testModeloCache = testModeloCache;
        window.limpiarConsola = limpiarConsola;
        
        // Inicializar
        inicializarThreeJS();
    </script>
</body>
</html>
