<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐻 Debug Simple</title>
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background: #1a1a1a; color: white; }
        #gameContainer { width: 100%; height: 400px; border: 2px solid #333; }
        #info { margin-top: 20px; padding: 15px; background: #333; border-radius: 5px; }
        button { padding: 10px 20px; margin: 5px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #45a049; }
        .log { margin: 2px 0; padding: 3px; background: #222; border-radius: 3px; font-size: 12px; }
    </style>
</head>
<body>
    <h1>🐻 Debug Simple - Modelo de Oso</h1>
    
    <div id="gameContainer"></div>
    
    <div id="info">
        <button onclick="testDirecto()">🔄 Test Directo</button>
        <button onclick="testCache()">📦 Test Cache</button>
        <button onclick="limpiar()">🧹 Limpiar</button>
        <div id="logs"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script type="module">
        let scene, camera, renderer;
        
        function init() {
            const container = document.getElementById('gameContainer');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            
            camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 2, 5);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);
            
            // Luz ambiente fuerte
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            
            // Luz direccional
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
            directionalLight.position.set(5, 5, 5);
            scene.add(directionalLight);
            
            animate();
            log('✅ Three.js listo');
        }
        
        function testDirecto() {
            log('🔄 Cargando modelo directo...');
            
            const loader = new THREE.GLTFLoader();
            loader.load('/modelos/cubed_bear.glb', (gltf) => {
                log('✅ Modelo cargado');
                
                const modelo = gltf.scene;
                modelo.position.set(0, 0, 0);
                modelo.scale.set(2, 2, 2);
                
                // Limpiar escena
                while(scene.children.length > 2) { // Mantener solo las luces
                    scene.remove(scene.children[2]);
                }
                
                // Diagnosticar
                let meshCount = 0;
                modelo.traverse((child) => {
                    if (child.isMesh) {
                        meshCount++;
                        log(`🔍 Mesh ${meshCount}: ${child.name || 'sin nombre'}`);
                        log(`   - Visible: ${child.visible}`);
                        log(`   - Geometría: ${child.geometry.constructor.name}`);
                        
                        if (child.material) {
                            log(`   - Material: ${child.material.constructor.name}`);
                            log(`   - Material visible: ${child.material.visible}`);
                            log(`   - Opacity: ${child.material.opacity}`);
                            log(`   - Transparent: ${child.material.transparent}`);
                            
                            if (child.material.color) {
                                const hex = child.material.color.getHex();
                                log(`   - Color: #${hex.toString(16).padStart(6, '0')}`);
                            }
                        }
                    }
                });
                
                scene.add(modelo);
                log(`🎉 Modelo agregado con ${meshCount} meshes`);
                
            }, undefined, (error) => {
                log(`❌ Error: ${error.message}`);
            });
        }
        
        async function testCache() {
            try {
                log('📦 Probando cache...');
                
                const { precargarModeloOso, crearClonOso } = await import('./src/sistemas/modeloCache.js');
                
                log('🔄 Precargando...');
                await precargarModeloOso();
                log('✅ Precargado');
                
                log('🔄 Creando clon...');
                const clon = crearClonOso();
                
                if (clon) {
                    // Limpiar escena
                    while(scene.children.length > 2) {
                        scene.remove(scene.children[2]);
                    }
                    
                    clon.position.set(0, 0, 0);
                    scene.add(clon);
                    log('🎉 Clon agregado');
                } else {
                    log('❌ Clon es null');
                }
                
            } catch (error) {
                log(`❌ Error cache: ${error.message}`);
            }
        }
        
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        
        function log(msg) {
            const div = document.createElement('div');
            div.className = 'log';
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            document.getElementById('logs').appendChild(div);
            console.log(msg);
        }
        
        function limpiar() {
            document.getElementById('logs').innerHTML = '';
        }
        
        window.testDirecto = testDirecto;
        window.testCache = testCache;
        window.limpiar = limpiar;
        
        init();
    </script>
</body>
</html>
