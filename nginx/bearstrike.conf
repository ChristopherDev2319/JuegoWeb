# ============================================
# NGINX Configuration for BearStrike
# FPS Multiplayer Game - Production Hardened
# Dominios: bearstrike.com.mx, www.bearstrike.com.mx
# ============================================

# ============================================
# RATE LIMITING ZONES
# ============================================
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=static_limit:10m rate=100r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ============================================
# UPSTREAMS
# ============================================
upstream websocket_game {
    ip_hash;  # Sticky sessions - mismo cliente siempre va al mismo worker
    server 127.0.0.1:3000 max_fails=3 fail_timeout=30s weight=1;
    keepalive 128;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

upstream backend_api {
    least_conn;
    server 127.0.0.1:3001 max_fails=3 fail_timeout=30s;
    keepalive 64;
    keepalive_requests 100;
}

upstream cluster_status {
    server 127.0.0.1:3002;
    keepalive 8;
}

# ============================================
# CORS WHITELIST
# ============================================
map $http_origin $cors_origin {
    default "";
    "https://bearstrike.com.mx" $http_origin;
    "~^https?://localhost(:[0-9]+)?$" $http_origin;
}

# ============================================
# WEBSOCKET LOG SEPARATION
# ============================================
map $http_upgrade $is_websocket {
    default 0;
    "websocket" 1;
}

map $is_websocket $loggable {
    1 0;
    0 1;
}

# Determinar backend según tipo de conexión
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# ============================================
# HTTP → HTTPS REDIRECT
# ============================================
server {
    listen 80;
    listen [::]:80;
    server_name bearstrike.com.mx www.bearstrike.com.mx;
    
    # Certbot validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }
    
    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://bearstrike.com.mx$request_uri;
    }
}

# ============================================
# WWW → NON-WWW (HTTPS)
# ============================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.bearstrike.com.mx;
    
    ssl_certificate /etc/letsencrypt/live/bearstrike.com.mx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bearstrike.com.mx/privkey.pem;
    
    return 301 https://bearstrike.com.mx$request_uri;
}

# ============================================
# MAIN HTTPS SERVER
# ============================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name bearstrike.com.mx;
    
    # ============================================
    # SSL/TLS CONFIGURATION
    # ============================================
    ssl_certificate /etc/letsencrypt/live/bearstrike.com.mx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bearstrike.com.mx/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:50m;
    ssl_session_tickets off;
    
    # OCSP Stapling desactivado (Let's Encrypt no siempre lo soporta)
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # ssl_trusted_certificate /etc/letsencrypt/live/bearstrike.com.mx/chain.pem;
    
    resolver 8.8.8.8 8.8.4.4 1.1.1.1 valid=300s;
    resolver_timeout 5s;
    
    # ============================================
    # SECURITY HEADERS
    # ============================================
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # CSP para HTTPS (wss:// y CDNs externos)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' blob: https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' wss://bearstrike.com.mx https://bearstrike.com.mx; worker-src 'self' blob:; child-src 'self' blob:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;
    
    # ============================================
    # LOGGING
    # ============================================
    access_log /var/log/nginx/bearstrike.access.log combined buffer=32k flush=5s if=$loggable;
    access_log /var/log/nginx/bearstrike.ws.log combined buffer=32k flush=5s if=$is_websocket;
    error_log /var/log/nginx/bearstrike.error.log warn;
    
    # ============================================
    # ROOT & CLIENT SETTINGS
    # ============================================
    root /var/www/bearstrike;
    index index.html;
    
    client_max_body_size 10M;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # ============================================
    # GZIP COMPRESSION
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml;
    gzip_proxied any;
    gzip_disable "msie6";
    gzip_buffers 16 8k;
    
    # ============================================
    # STATIC FILES
    # ============================================
    location / {
        limit_req zone=static_limit burst=50 nodelay;
        
        # Si es WebSocket, ir al backend de juego
        if ($http_upgrade = "websocket") {
            rewrite ^(.*)$ /websocket-proxy last;
        }
        
        try_files $uri $uri/ /index.html;
    }
    
    # WebSocket proxy interno
    location = /websocket-proxy {
        internal;
        
        proxy_pass http://websocket_game/;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        
        proxy_buffering off;
        proxy_cache off;
        tcp_nodelay on;
    }
    
    location ~* \.(js|mjs|css)$ {
        limit_req zone=static_limit burst=50 nodelay;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }
    
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }
    
    location ~* \.(glb|gltf|fbx|obj|bin|dae)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
        try_files $uri =404;
    }
    
    location ~* \.(mp3|ogg|wav|m4a|aac|flac)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }
    
    location ~* \.(woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
        try_files $uri =404;
    }
    
    location ~* \.wasm$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Content-Type application/wasm;
        access_log off;
        try_files $uri =404;
    }
    
    # ============================================
    # WEBSOCKET - GAME SERVER
    # ============================================
    location /ws {
        if ($http_upgrade != "websocket") {
            return 426;
        }
        
        limit_req zone=ws_limit burst=20 nodelay;
        
        proxy_pass http://websocket_game;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        proxy_max_temp_file_size 0;
        
        tcp_nodelay on;
    }
    
    location /socket {
        if ($http_upgrade != "websocket") {
            return 426;
        }
        
        limit_req zone=ws_limit burst=20 nodelay;
        
        proxy_pass http://websocket_game;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        
        proxy_buffering off;
        proxy_cache off;
        proxy_max_temp_file_size 0;
        
        tcp_nodelay on;
    }
    
    location ~ ^/socket\.io/ {
        limit_req zone=ws_limit burst=30 nodelay;
        
        proxy_pass http://websocket_game;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        proxy_buffering off;
        proxy_cache off;
        
        tcp_nodelay on;
    }

    # ============================================
    # REST API BACKEND
    # ============================================
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;
        
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-CSRF-Token" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            return 204;
        }
        
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
    }
    
    # ============================================
    # CLUSTER STATUS ENDPOINT
    # ============================================
    location /cluster/ {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        
        proxy_pass http://cluster_status/;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # ============================================
    # HEALTH CHECKS
    # ============================================
    location /health {
        access_log off;
        proxy_pass http://backend_api/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }
    
    location /ws-health {
        access_log off;
        proxy_pass http://cluster_status/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }
    
    location /nginx-status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow ::1;
        deny all;
    }
    
    # ============================================
    # ASSET DIRECTORIES
    # ============================================
    location /modelos/ {
        limit_req zone=static_limit burst=30 nodelay;
        alias /var/www/bearstrike/modelos/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }
    
    location /sonidos/ {
        limit_req zone=static_limit burst=30 nodelay;
        alias /var/www/bearstrike/sonidos/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    location /Sonidos%20de%20armas/ {
        limit_req zone=static_limit burst=30 nodelay;
        alias "/var/www/bearstrike/Sonidos de armas/";
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    location /css/ {
        limit_req zone=static_limit burst=30 nodelay;
        alias /var/www/bearstrike/css/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    location /src/ {
        limit_req zone=static_limit burst=50 nodelay;
        alias /var/www/bearstrike/src/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
        
        location ~ \.(ts|tsx|jsx|map)$ {
            deny all;
            return 404;
        }
    }
    
    # ============================================
    # SECURITY - DENY ACCESS
    # ============================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ^/(backend|server|node_modules|\.git|\.vscode|\.kiro|logs|database|JuegoWeb|test|tests|spec)/ {
        deny all;
        return 404;
    }
    
    location ~ \.(env|log|sql|conf|yaml|yml|lock|bak|swp|orig|ts|tsx|jsx)$ {
        deny all;
        return 404;
    }
    
    location ~ (package\.json|package-lock\.json|yarn\.lock|render\.yaml|tsconfig\.json|webpack\.config\.js)$ {
        deny all;
        return 404;
    }
    
    location ~ ^/test-.*\.html$ {
        deny all;
        return 404;
    }
    
    location ~ \.map$ {
        deny all;
        return 404;
    }
    
    location ~ \.md$ {
        deny all;
        return 404;
    }
    
    # ============================================
    # ERROR PAGES
    # ============================================
    error_page 404 /404.html;
    location = /404.html {
        root /var/www/bearstrike;
        internal;
    }
    
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
    
    error_page 429 /429.html;
    location = /429.html {
        root /usr/share/nginx/html;
        internal;
    }
    
    error_page 426 /426.html;
    location = /426.html {
        root /usr/share/nginx/html;
        internal;
    }
}
