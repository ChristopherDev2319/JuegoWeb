<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>🤖 Test Bots Paso a Paso</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: Arial; padding: 20px; }
        #container { width: 100%; height: 60vh; border: 2px solid #333; margin-bottom: 20px; }
        #controls { background: #333; padding: 15px; border-radius: 5px; margin-bottom: 10px; }
        #logs { background: #222; padding: 10px; border-radius: 5px; height: 200px; overflow-y: auto; }
        button { margin: 5px; padding: 8px 16px; background: #4CAF50; color: white; border: none; border-radius: 3px; cursor: pointer; }
        button:disabled { background: #666; cursor: not-allowed; }
        .log { margin: 2px 0; font-size: 12px; }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
        .warning { color: #ff9800; }
    </style>
</head>
<body>
    <h1>🤖 Test Bots Paso a Paso</h1>
    
    <div id="container"></div>
    
    <div id="controls">
        <button id="btn1" onclick="paso1()">1️⃣ Inicializar Three.js</button>
        <button id="btn2" onclick="paso2()" disabled>2️⃣ Precargar Modelo</button>
        <button id="btn3" onclick="paso3()" disabled>3️⃣ Crear BotManager</button>
        <button id="btn4" onclick="paso4()" disabled>4️⃣ Inicializar Bots</button>
        <button id="btn5" onclick="paso5()" disabled>5️⃣ Verificar Bots</button>
        <button onclick="limpiarLogs()">🧹 Limpiar</button>
    </div>
    
    <div id="logs"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script type="module">
        let scene, camera, renderer, botManager;
        let pasoActual = 0;
        
        // Paso 1: Inicializar Three.js
        function paso1() {
            log('🚀 Paso 1: Inicializando Three.js...', 'success');
            
            const container = document.getElementById('container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            
            camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 5, 15);
            camera.lookAt(0, 0, 0);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);
            
            // Luces
            const ambientLight = new THREE.AmbientLight(0x404040, 0.8);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
            directionalLight.position.set(10, 10, 5);
            directionalLight.castShadow = true;
            scene.add(directionalLight);
            
            // Suelo
            const groundGeometry = new THREE.PlaneGeometry(50, 50);
            const groundMaterial = new THREE.MeshLambertMaterial({ color: 0x90EE90 });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
            
            animate();
            
            log('✅ Three.js inicializado correctamente', 'success');
            habilitarPaso(2);
        }
        
        // Paso 2: Precargar modelo
        async function paso2() {
            try {
                log('🐻 Paso 2: Precargando modelo de oso...', 'success');
                
                const { precargarModeloOso } = await import('./src/sistemas/modeloCache.js');
                
                const modelo = await precargarModeloOso();
                
                if (modelo) {
                    log('✅ Modelo precargado exitosamente', 'success');
                    log(`📊 Hijos del modelo: ${modelo.children.length}`, 'success');
                    
                    // Diagnosticar modelo
                    let meshCount = 0;
                    modelo.traverse((child) => {
                        if (child.isMesh) {
                            meshCount++;
                            log(`🔍 Mesh ${meshCount}: ${child.name || 'sin nombre'}`, 'success');
                        }
                    });
                    
                    log(`📊 Total meshes en modelo: ${meshCount}`, 'success');
                    habilitarPaso(3);
                } else {
                    log('❌ Modelo es null', 'error');
                }
                
            } catch (error) {
                log(`❌ Error precargando: ${error.message}`, 'error');
                console.error(error);
            }
        }
        
        // Paso 3: Crear BotManager
        async function paso3() {
            try {
                log('🤖 Paso 3: Creando BotManager...', 'success');
                
                const { BotManager } = await import('./src/sistemas/botManager.js');
                
                botManager = new BotManager(scene, {
                    onEliminacion: (tipoBot, estadisticas) => {
                        log(`📊 Bot ${tipoBot} eliminado`, 'success');
                    },
                    onEntrarZona: (nombreZona, tipoZona) => {
                        log(`📍 Entrando en zona: ${nombreZona}`, 'success');
                    }
                });
                
                log('✅ BotManager creado', 'success');
                habilitarPaso(4);
                
            } catch (error) {
                log(`❌ Error creando BotManager: ${error.message}`, 'error');
                console.error(error);
            }
        }
        
        // Paso 4: Inicializar bots
        async function paso4() {
            try {
                log('⚙️ Paso 4: Inicializando sistema de bots...', 'success');
                
                await botManager.inicializar();
                
                log('✅ Sistema de bots inicializado', 'success');
                habilitarPaso(5);
                
            } catch (error) {
                log(`❌ Error inicializando bots: ${error.message}`, 'error');
                console.error(error);
            }
        }
        
        // Paso 5: Verificar bots
        function paso5() {
            log('🔍 Paso 5: Verificando bots...', 'success');
            
            if (!botManager) {
                log('❌ BotManager no existe', 'error');
                return;
            }
            
            const totalBots = botManager.obtenerTotalBots();
            const botsVivos = botManager.obtenerBotsVivos().length;
            const todosBots = botManager.obtenerTodosBots();
            
            log(`📊 Total bots: ${totalBots}`, 'success');
            log(`📊 Bots vivos: ${botsVivos}`, 'success');
            
            let botsConMesh = 0;
            let botsVisibles = 0;
            
            todosBots.forEach((bot, index) => {
                const tieneMesh = bot.mesh !== null;
                const esVisible = tieneMesh && bot.mesh.visible;
                
                if (tieneMesh) botsConMesh++;
                if (esVisible) botsVisibles++;
                
                const status = tieneMesh ? '✅' : '❌';
                const visStatus = esVisible ? '👁️' : '🙈';
                
                log(`${status}${visStatus} Bot ${index + 1} (${bot.tipo}): mesh=${tieneMesh}, visible=${esVisible}`, tieneMesh ? 'success' : 'error');
                
                if (tieneMesh) {
                    const pos = bot.obtenerPosicion();
                    log(`   📍 Posición: (${pos.x.toFixed(1)}, ${pos.y.toFixed(1)}, ${pos.z.toFixed(1)})`, 'success');
                    
                    // Verificar meshes hijos
                    let meshHijos = 0;
                    bot.mesh.traverse((child) => {
                        if (child.isMesh) meshHijos++;
                    });
                    log(`   🔍 Meshes hijos: ${meshHijos}`, 'success');
                }
            });
            
            log(`📊 Resumen: ${botsConMesh}/${totalBots} con mesh, ${botsVisibles}/${totalBots} visibles`, botsConMesh === totalBots ? 'success' : 'error');
            
            if (botsConMesh === totalBots && botsVisibles === totalBots) {
                log('🎉 ¡ÉXITO! Todos los bots están correctos', 'success');
            } else {
                log('❌ Hay problemas con los bots', 'error');
            }
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            if (botManager) {
                botManager.actualizar(16);
            }
            
            renderer.render(scene, camera);
        }
        
        function habilitarPaso(paso) {
            pasoActual = paso;
            for (let i = 1; i <= 5; i++) {
                const btn = document.getElementById(`btn${i}`);
                btn.disabled = i > paso;
            }
        }
        
        function log(mensaje, tipo = 'success') {
            const div = document.createElement('div');
            div.className = `log ${tipo}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${mensaje}`;
            document.getElementById('logs').appendChild(div);
            document.getElementById('logs').scrollTop = document.getElementById('logs').scrollHeight;
            console.log(mensaje);
        }
        
        function limpiarLogs() {
            document.getElementById('logs').innerHTML = '';
        }
        
        // Hacer funciones globales
        window.paso1 = paso1;
        window.paso2 = paso2;
        window.paso3 = paso3;
        window.paso4 = paso4;
        window.paso5 = paso5;
        window.limpiarLogs = limpiarLogs;
        
        // Manejar redimensionamiento
        window.addEventListener('resize', () => {
            if (camera && renderer) {
                const container = document.getElementById('container');
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            }
        });
    </script>
</body>
</html>
