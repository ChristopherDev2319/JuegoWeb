<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Test Juego Directo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        #debug-overlay {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 5px;
            z-index: 1000;
            font-size: 12px;
            max-width: 300px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .success { color: #00ff00; }
        .error { color: #ff4444; }
        .warning { color: #ffaa44; }
        .info { color: #4488ff; }
        
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        
        #loading-bar {
            width: 300px;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        #loading-progress {
            height: 100%;
            background: linear-gradient(90deg, #00ff00, #44ff44);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <h2>🎮 Cargando Juego...</h2>
        <div id="loading-bar">
            <div id="loading-progress"></div>
        </div>
        <div id="loading-text">Iniciando...</div>
    </div>
    
    <div id="debug-overlay">
        <div><strong>🔍 Debug del Juego</strong></div>
        <div id="debug-log">Iniciando...</div>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script type="module">
        const debugLog = document.getElementById('debug-log');
        const loadingText = document.getElementById('loading-text');
        const loadingProgress = document.getElementById('loading-progress');
        const loadingScreen = document.getElementById('loading-screen');
        
        let scene, camera, renderer;
        let progreso = 0;
        
        function log(mensaje, tipo = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const className = tipo;
            debugLog.innerHTML += `<div class="${className}">[${timestamp}] ${mensaje}</div>`;
            debugLog.scrollTop = debugLog.scrollHeight;
            console.log(`[${timestamp}] ${mensaje}`);
        }
        
        function actualizarProgreso(porcentaje, texto) {
            progreso = porcentaje;
            loadingProgress.style.width = `${porcentaje}%`;
            loadingText.textContent = texto;
            log(`📊 ${porcentaje}% - ${texto}`, 'info');
        }
        
        function ocultarPantallaCarga() {
            loadingScreen.style.display = 'none';
            log('✅ Pantalla de carga ocultada', 'success');
        }
        
        async function inicializarJuego() {
            try {
                log('🚀 Iniciando juego...', 'info');
                actualizarProgreso(10, 'Creando escena...');
                
                // Paso 1: Crear escena
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x87CEEB); // Azul cielo en lugar de negro
                log('✅ Escena creada con fondo azul', 'success');
                
                // Paso 2: Crear cámara
                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(0, 2, 5);
                log('✅ Cámara creada y posicionada', 'success');
                
                // Paso 3: Crear renderer
                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.shadowMap.enabled = false;
                document.body.appendChild(renderer.domElement);
                log('✅ Renderer creado y añadido al DOM', 'success');
                
                actualizarProgreso(30, 'Configurando iluminación...');
                
                // Paso 4: Añadir luces
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
                scene.add(ambientLight);
                
                const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
                directionalLight.position.set(50, 100, 50);
                scene.add(directionalLight);
                log('✅ Luces añadidas', 'success');
                
                actualizarProgreso(50, 'Cargando mapa...');
                
                // Paso 5: Cargar mapa
                await cargarMapa();
                
                actualizarProgreso(80, 'Creando bots...');
                
                // Paso 6: Crear bots de prueba
                await crearBots();
                
                actualizarProgreso(100, '¡Listo!');
                
                // Paso 7: Iniciar bucle de renderizado
                iniciarBucleJuego();
                
                // Paso 8: Ocultar pantalla de carga después de un momento
                setTimeout(() => {
                    ocultarPantallaCarga();
                    log('🎉 JUEGO INICIADO - ¿Puedes ver algo?', 'success');
                }, 1000);
                
            } catch (error) {
                log(`❌ ERROR CRÍTICO: ${error.message}`, 'error');
                console.error('Error completo:', error);
            }
        }
        
        async function cargarMapa() {
            return new Promise((resolve, reject) => {
                const loader = new THREE.GLTFLoader();
                
                // Intentar cargar el mapa
                loader.load('/modelos/map_visual.glb', 
                    (gltf) => {
                        const mapa = gltf.scene;
                        mapa.scale.setScalar(5);
                        mapa.position.set(0, 0, 0);
                        
                        mapa.traverse((child) => {
                            if (child.isMesh) {
                                child.castShadow = false;
                                child.receiveShadow = false;
                            }
                        });
                        
                        scene.add(mapa);
                        log('✅ Mapa visual cargado y añadido', 'success');
                        resolve();
                    },
                    (progress) => {
                        if (progress.total > 0) {
                            const percent = Math.round((progress.loaded / progress.total) * 100);
                            log(`📦 Cargando mapa: ${percent}%`, 'info');
                        }
                    },
                    (error) => {
                        log(`⚠️ Error cargando mapa, usando suelo fallback: ${error.message}`, 'warning');
                        crearSueloFallback();
                        resolve(); // Continuar de todas formas
                    }
                );
            });
        }
        
        function crearSueloFallback() {
            const groundGeometry = new THREE.PlaneGeometry(250, 250);
            const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x228b22 });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);
            log('✅ Suelo fallback verde creado', 'success');
        }
        
        async function crearBots() {
            return new Promise((resolve) => {
                const loader = new THREE.GLTFLoader();
                
                // Intentar cargar modelo de oso
                loader.load('/modelos/cubed_bear.glb',
                    (gltf) => {
                        log('✅ Modelo de oso cargado', 'success');
                        
                        // Crear 3 osos
                        for (let i = 0; i < 3; i++) {
                            const oso = gltf.scene.clone();
                            oso.scale.set(3, 3, 3); // Escala grande
                            oso.position.set(i * 6 - 6, 0, -10);
                            
                            oso.traverse((child) => {
                                if (child.isMesh) {
                                    child.castShadow = true;
                                    child.receiveShadow = true;
                                    child.visible = true;
                                    
                                    if (child.material) {
                                        child.material.visible = true;
                                        child.material.needsUpdate = true;
                                        
                                        if (child.material.transparent && child.material.opacity === 0) {
                                            child.material.opacity = 1.0;
                                        }
                                        
                                        if (child.material.color && child.material.color.getHex() === 0x000000) {
                                            child.material.color.setHex(0x8B4513);
                                        }
                                    }
                                }
                            });
                            
                            scene.add(oso);
                            log(`✅ Oso ${i + 1} añadido en posición (${oso.position.x}, ${oso.position.y}, ${oso.position.z})`, 'success');
                        }
                        resolve();
                    },
                    undefined,
                    (error) => {
                        log(`⚠️ Error cargando osos, usando cubos fallback: ${error.message}`, 'warning');
                        
                        // Crear cubos fallback
                        for (let i = 0; i < 3; i++) {
                            const geometry = new THREE.BoxGeometry(3, 4, 3);
                            const material = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
                            const cube = new THREE.Mesh(geometry, material);
                            cube.position.set(i * 6 - 6, 2, -10);
                            scene.add(cube);
                            log(`✅ Cubo fallback ${i + 1} añadido`, 'success');
                        }
                        resolve();
                    }
                );
            });
        }
        
        function iniciarBucleJuego() {
            let frame = 0;
            
            function animate() {
                requestAnimationFrame(animate);
                
                // Rotar cámara lentamente para mostrar que funciona
                frame++;
                if (frame % 60 === 0) { // Cada segundo aprox
                    camera.position.x = Math.sin(frame * 0.01) * 10;
                    camera.position.z = Math.cos(frame * 0.01) * 10;
                    camera.lookAt(0, 0, 0);
                }
                
                // Renderizar
                renderer.render(scene, camera);
                
                // Log cada 5 segundos para confirmar que el bucle funciona
                if (frame % 300 === 0) {
                    log(`🔄 Bucle funcionando - Frame ${frame}`, 'info');
                }
            }
            
            animate();
            log('✅ Bucle de juego iniciado', 'success');
        }
        
        // Manejar redimensionamiento
        window.addEventListener('resize', () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
        
        // Capturar errores
        window.addEventListener('error', (event) => {
            log(`❌ ERROR: ${event.message}`, 'error');
            log(`📍 ${event.filename}:${event.lineno}:${event.colno}`, 'error');
        });
        
        window.addEventListener('unhandledrejection', (event) => {
            log(`❌ PROMESA RECHAZADA: ${event.reason}`, 'error');
        });
        
        // Iniciar el juego
        inicializarJuego();
    </script>
</body>
</html>
